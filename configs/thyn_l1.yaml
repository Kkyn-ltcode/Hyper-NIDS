name: "thyn_l1"

model:
  model_type: "thyn"
  encoder_type: "gru"      # "gru" (macOS) | "mamba" (CUDA)
  d_type: 16               # event type embedding dim
  d_model: 64              # input projection dim
  d_hidden: 64             # encoder hidden dim
  n_layers: 2
  dropout: 0.1

data:
  max_seq_len: 512
  stride: 512
  min_seq_len: 2
  label_type: "l1"         # L1** novel-binary labels
  train_shards: [0, 1, 2, 3, 4, 5, 6]
  val_shards: [7]
  test_shards: [8, 9]

training:
  batch_size: 64
  lr: 0.001
  weight_decay: 0.0001
  epochs: 30               # more epochs for harder task
  patience: 8              # more patience — convergence will be slower
  pos_weight: 25.0         # ~1% attack rate needs higher pos_weight
  grad_clip: 1.0
  log_every: 100
